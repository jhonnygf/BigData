version: "3.8"

# ════════════════════════════════════════════════════════════════
#  Stack: Apache Spark (imagen oficial) + Kafka
#  Lab: Detección de fugas de agua con Structured Streaming + MLlib
#
#  Imagen Spark: spark:latest  (imagen oficial Apache)
#  Comando de arranque explicitícamente con spark-class.
#
#  Kafka — DOS perfiles disponibles:
#
#    A) Con Zookeeper (clásico):
#         docker compose --profile zookeeper up -d
#
#    B) KRaft – sin Zookeeper (moderno, Kafka 3.x):
#         docker compose --profile kraft up -d
#
#  Spark SIEMPRE arranca (sin profile).
#  UI:  Spark Master   → http://localhost:8080
#       Spark Worker-1 → http://localhost:8081
#       Spark Worker-2 → http://localhost:8082
#       Spark App UI   → http://localhost:4040  (mientras corre un job)
# ════════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────────
  #  SPARK CLUSTER  (sin profile — siempre arranca)
  # ────────────────────────────────────────────────────────────────

  spark-master:
    image: spark:latest
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"   # Spark Master port (para workers y driver)
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
    networks:
      - spark-net
    command: ["/bin/bash","-lc","/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0 --port 7077 --webui-port 8080"]

  spark-worker-1:
    image: spark:latest
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8081:8081"   # Worker UI
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
    networks:
      - spark-net
    command: ["/bin/bash","-lc","/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081"]

  spark-worker-2:
    image: spark:latest
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8082:8082"   # Worker UI
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
    networks:
      - spark-net
    command: ["/bin/bash","-lc","/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8082"]

  # ────────────────────────────────────────────────────────────────
  #  OPCIÓN A — Kafka clásico con Zookeeper
  #  Usa: docker compose --profile zookeeper up -d
  # ────────────────────────────────────────────────────────────────

  zookeeper:
    profiles: [zookeeper]
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lab-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-zk:
    profiles: [zookeeper]
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-zk:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init-zk:
    profiles: [zookeeper]
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab-kafka-init
    depends_on:
      kafka-zk:
        condition: service_healthy
    networks:
      - spark-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creando topics (modo Zookeeper)..."
        kafka-topics --bootstrap-server kafka-zk:29092 \
          --create --if-not-exists --topic sensores-agua \
          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka-zk:29092 \
          --create --if-not-exists --topic alertas-fugas \
          --partitions 1 --replication-factor 1
        echo "Topics OK:"
        kafka-topics --bootstrap-server kafka-zk:29092 --list
    restart: "no"

  # ────────────────────────────────────────────────────────────────
  #  OPCIÓN B — Kafka KRaft (sin Zookeeper)
  #  Usa: docker compose --profile kraft up -d
  # ────────────────────────────────────────────────────────────────

  kafka-kraft:
    profiles: [kraft]
    image: confluentinc/cp-kafka:7.6.0
    container_name: lab-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-kraft:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka-kraft:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_kraft_data:/var/lib/kafka/data

  kafka-init-kraft:
    profiles: [kraft]
    image: confluentinc/cp-kafka:7.6.0
    container_name: lab-kafka-init
    depends_on:
      kafka-kraft:
        condition: service_healthy
    networks:
      - spark-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creando topics (modo KRaft)..."
        kafka-topics --bootstrap-server kafka-kraft:9094 \
          --create --if-not-exists --topic sensores-agua \
          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka-kraft:9094 \
          --create --if-not-exists --topic alertas-fugas \
          --partitions 1 --replication-factor 1
        echo "Topics OK:"
        kafka-topics --bootstrap-server kafka-kraft:9094 --list
    restart: "no"

volumes:
  kafka_kraft_data:

networks:
  spark-net:
    driver: bridge
══
#  Stack: Apache Spark 3.5 + Kafka + Spark Workers
#  Lab: Detección de fugas de agua con Structured Streaming + MLlib
#
#  Hay DOS perfiles de Kafka disponibles:
#
#  A) Modo clásico — Kafka + Zookeeper:
#       docker compose --profile zookeeper up -d
#
#  B) Modo moderno — Kafka KRaft (sin Zookeeper, Kafka 3.x / CP 7.4+):
#       docker compose --profile kraft up -d
#
#  Puertos expuestos (ambos modos):
#    Spark Master UI  → http://localhost:8080
#    Spark App UI     → http://localhost:4040  (mientras corre un job)
#    Kafka broker     → localhost:9092
#    Zookeeper        → localhost:2181  (solo perfil zookeeper)
# ══════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════════════════════════════
  #  OPCIÓN A — Kafka clásico con Zookeeper
  #  Usa: docker compose --profile zookeeper up -d
  # ════════════════════════════════════════════════════════════════

  zookeeper:
    profiles: [zookeeper]
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lab-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka broker (modo Zookeeper) ────────────────────────────
  kafka-zk:
    profiles: [zookeeper]
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-zk:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init-zk:
    profiles: [zookeeper]
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab-kafka-init
    depends_on:
      kafka-zk:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creando topics (modo Zookeeper)..."
        kafka-topics --bootstrap-server kafka-zk:29092 \
          --create --if-not-exists --topic sensores-agua \
          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka-zk:29092 \
          --create --if-not-exists --topic alertas-fugas \
          --partitions 1 --replication-factor 1
        echo "Topics OK:"
        kafka-topics --bootstrap-server kafka-zk:29092 --list
    restart: "no"

  # ════════════════════════════════════════════════════════════════
  #  OPCIÓN B — Kafka KRaft (sin Zookeeper) ✨ MODO MODERNO
  #
  #  KRaft = Kafka Raft Metadata. Disponible desde Kafka 2.8 (preview)
  #  y estable desde Kafka 3.3 / Confluent Platform 7.4.
  #
  #  Ventajas sobre Zookeeper:
  #    - Un proceso menos que operar y monitorizar
  #    - Arranque más rápido (no espera a ZK)
  #    - Escala a millones de particiones (ZK tiene límite práctico ~200k)
  #    - El metadata log es un Kafka topic interno — mismas herramientas
  #
  #  Usa: docker compose --profile kraft up -d
  # ════════════════════════════════════════════════════════════════

  kafka-kraft:
    profiles: [kraft]
    image: confluentinc/cp-kafka:7.6.0
    container_name: lab-kafka
    ports:
      - "9092:9092"
    environment:
      # ── KRaft: el broker también actúa como controller ──────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"   # ← sin ZK: un solo proceso
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-kraft:9093"

      # Listeners:
      #   9092 → externo (tu host)
      #   9093 → controller interno (KRaft)
      #   9094 → broker interno (docker network)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka-kraft:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      # Cluster ID fijo para el lab (en producción genera uno con kafka-storage)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_kraft_data:/var/lib/kafka/data

  kafka-init-kraft:
    profiles: [kraft]
    image: confluentinc/cp-kafka:7.6.0
    container_name: lab-kafka-init
    depends_on:
      kafka-kraft:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creando topics (modo KRaft)..."
        kafka-topics --bootstrap-server kafka-kraft:9094 \
          --create --if-not-exists --topic sensores-agua \
          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka-kraft:9094 \
          --create --if-not-exists --topic alertas-fugas \
          --partitions 1 --replication-factor 1
        echo "Topics OK:"
        kafka-topics --bootstrap-server kafka-kraft:9094 --list
    restart: "no"

  # ════════════════════════════════════════════════════════════════
  #  Spark (sin profile — siempre se levanta con cualquier opción)
  # ════════════════════════════════════════════════════════════════

  spark-master:
    image: bitnami/spark:3.5
    container_name: lab-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"   # Spark master port
    volumes:
      - ./lab_jobs:/opt/bitnami/spark/lab_jobs       # scripts Python del lab
      - ./lab_data:/opt/bitnami/spark/lab_data       # datos sintéticos generados
      - ./lab_models:/opt/bitnami/spark/lab_models   # modelos MLlib guardados
      - ./lab_checkpoint:/tmp/checkpoint              # checkpoints streaming

  # ── Spark Worker (1 nodo de ejecución) ────────────────────────
  spark-worker:
    image: bitnami/spark:3.5
    container_name: lab-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8081:8081"   # Worker UI
    volumes:
      - ./lab_jobs:/opt/bitnami/spark/lab_jobs
      - ./lab_data:/opt/bitnami/spark/lab_data
      - ./lab_models:/opt/bitnami/spark/lab_models
      - ./lab_checkpoint:/tmp/checkpoint

volumes:
  kafka_kraft_data:

networks:
  default:
    name: spark-lab-network
